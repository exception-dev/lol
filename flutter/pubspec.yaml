name: lol_champion
description: League of Legends champion information built with Flutter.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.9
  dio: ^5.10.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  flutter_secure_storage: ^10.3.1
  go_router: ^17.3.0
  intl: any
  json_annotation: ^4.12.0
  riverpod_annotation: ^4.0.3

dev_dependencies:
  build_runner: ^2.15.1
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  json_serializable: ^6.14.0
  riverpod_generator: ^4.0.4

flutter:
  generate: true
  uses-material-design: true
